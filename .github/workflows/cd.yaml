name: Backend CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sigesi-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sigesi-backend:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy production compose and Caddy config to VPS
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "compose-prod.yaml,Caddyfile"
          target: "~/pipeline/sigesi"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          debug: true
          script: |
            cd ~/pipeline/sigesi

            cat > .env <<EOF
            APP_PUBLIC_URL=https://sigesi.ezioalves.cloud
            APP_DOMAIN=sigesi.ezioalves.cloud
            APP_CORS_ALLOWED_ORIGINS=https://sigesi.ezioalves.cloud,http://localhost:3000
            OAUTH2_SUCCESS_REDIRECT=https://sigesi.ezioalves.cloud/portal
            OAUTH2_FAILURE_REDIRECT=https://sigesi.ezioalves.cloud/?authError=usuario_inativo
            OAUTH2_LOGOUT_REDIRECT=https://sigesi.ezioalves.cloud
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            IMAGE_TAG=latest
            DATABASE_NAME=${{ secrets.DATABASE_NAME }}
            DB_NAME=${{ secrets.DATABASE_NAME }}
            DATABASE_USER=${{ secrets.DATABASE_USER }}
            DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
            DATABASE_URL=jdbc:postgresql://db:5432/${{ secrets.DATABASE_NAME }}
            MINIO_ACCESS_KEY=${{ secrets.MINIO_ACCESS_KEY }}
            MINIO_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            RABBITMQ_HOST=rabbitmq
            RABBITMQ_PORT=5672
            RABBITMQ_USERNAME=${{ secrets.RABBITMQ_USERNAME }}
            RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
            EOF

            docker compose -f compose-prod.yaml pull sigesi-backend
            docker compose -f compose-prod.yaml up -d --remove-orphans
            docker compose -f compose-prod.yaml ps
