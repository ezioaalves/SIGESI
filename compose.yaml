services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: sigesi
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    volumes:
      - sigesi_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d ${DB_NAME:-sigesi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sigesi-network

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      RABBITMQ_HOST: rabbitmq
    ports:
      - 8080:8080
    networks:
      - sigesi-network

  minio:
    image: minio/minio:latest
    container_name: sigesi-minio
    ports:
      - "9000:9000"      # API port
      - "9001:9001"      # Console UI port
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - sigesi-network

volumes:
  sigesi_data:
  minio_data:

networks:
  sigesi-network:
    name: sigesi-network
