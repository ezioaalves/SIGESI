events {
    worker_connections 1024;
}

http {

    upstream sigesi_backend {
        server sigesi-backend:8080;
    }

    upstream sigesi_frontend {
        server sigesi-frontend:80;
    }

    server {
        listen 80;
        server_name ezioalves.space;

        location / {
            proxy_pass http://sigesi_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_redirect off;
        }

        location /oauth2/ {
            proxy_pass http://sigesi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_redirect off;
        }
    }
}


