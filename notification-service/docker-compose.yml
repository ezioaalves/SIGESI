services:
  notification-service:
    build: .
    container_name: sigesi-notification-service
    ports:
      - "8001:8000"
    environment:
      - NOTIFICATION_DATABASE_URL=postgresql+asyncpg://notif_user:notif_pass@notification-db:5432/notifications
      - NOTIFICATION_RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - NOTIFICATION_RABBITMQ_QUEUE=sigesi_notifications
      - NOTIFICATION_RABBITMQ_EXCHANGE=sigesi_events
      - NOTIFICATION_SMTP_HOST=${NOTIFICATION_SMTP_HOST:-smtp.gmail.com}
      - NOTIFICATION_SMTP_PORT=${NOTIFICATION_SMTP_PORT:-587}
      - NOTIFICATION_SMTP_USERNAME=${NOTIFICATION_SMTP_USERNAME:-}
      - NOTIFICATION_SMTP_PASSWORD=${NOTIFICATION_SMTP_PASSWORD:-}
      - NOTIFICATION_SMTP_FROM_EMAIL=${NOTIFICATION_SMTP_FROM_EMAIL:-noreply@sigesi.com}
      - NOTIFICATION_SMTP_FROM_NAME=${NOTIFICATION_SMTP_FROM_NAME:-SIGESI Notificações}
    depends_on:
      - notification-db
      - rabbitmq
    restart: unless-stopped
    networks:
      - default
      - sigesi-network

  notification-db:
    image: postgres:16-alpine
    container_name: sigesi-notification-db
    environment:
      - POSTGRES_USER=notif_user
      - POSTGRES_PASSWORD=notif_pass
      - POSTGRES_DB=notifications
    ports:
      - "5433:5432"
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: sigesi-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - default
      - sigesi-network

volumes:
  notification_db_data:
  rabbitmq_data:

networks:
  sigesi-network:
    external: true