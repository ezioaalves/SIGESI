services:
  caddy:
    image: caddy:2-alpine
    container_name: sigesi-caddy
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - sigesi-backend
      - sigesi-frontend
    restart: always

  db:
    image: postgres:17
    env_file:
      - .env
    volumes:
      - sigesi_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  sigesi-backend:
    image: ${DOCKERHUB_USERNAME}/sigesi-backend:${IMAGE_TAG:-latest}
    container_name: sigesi-backend
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    env_file:
      - .env
    expose:
      - "8080"
    restart: always

  sigesi-frontend:
    image: ${DOCKERHUB_USERNAME}/sigesi-frontend:${IMAGE_TAG:-latest}
    container_name: sigesi-frontend
    expose:
      - "80"
    restart: always

  minio:
    image: minio/minio:latest
    container_name: sigesi-minio
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: always

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: sigesi-rabbitmq
    expose:
      - "5672"
      - "15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

volumes:
  sigesi_data:
  minio_data:
  rabbitmq_data:
  caddy_data:
  caddy_config:
