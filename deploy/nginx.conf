events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    server {
        listen 80;
        server_name sigesi.ezioalves.cloud;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 80;
        server_name sigesi-test.ezioalves.cloud;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name sigesi-test.ezioalves.cloud;

        ssl_certificate /etc/letsencrypt/live/sigesi-test.ezioalves.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sigesi-test.ezioalves.cloud/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location = /api/arquivos/upload {
            client_max_body_size 6m;
            error_page 413 = @arquivo_grande_teste;
            set $test_frontend "sigesi-test-frontend-1:80";
            proxy_pass http://$test_frontend;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_redirect off;
        }

        location @arquivo_grande_teste {
            default_type application/json;
            return 413 '{"status":413,"error":"Arquivo muito grande","message":"O arquivo excede o limite máximo de 5 MB"}';
        }

        location / {
            set $test_frontend "sigesi-test-frontend-1:80";
            proxy_pass http://$test_frontend;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_redirect off;
        }
    }

    server {
        listen 443 ssl;
        server_name sigesi.ezioalves.cloud;

        ssl_certificate /etc/letsencrypt/live/sigesi.ezioalves.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sigesi.ezioalves.cloud/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location = /api/arquivos/upload {
            client_max_body_size 6m;
            error_page 413 = @arquivo_grande_producao;
            set $prod_backend "sigesi-backend:8080";
            proxy_pass http://$prod_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        location @arquivo_grande_producao {
            default_type application/json;
            return 413 '{"status":413,"error":"Arquivo muito grande","message":"O arquivo excede o limite máximo de 5 MB"}';
        }

        location /api {
            set $prod_backend "sigesi-backend:8080";
            proxy_pass http://$prod_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        location / {
            set $prod_frontend "sigesi-frontend:80";
            proxy_pass http://$prod_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        location ~ ^/(oauth2|login|logout) {
            set $prod_backend "sigesi-backend:8080";
            proxy_pass http://$prod_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }
    }
}
