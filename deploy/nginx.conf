events {
    worker_connections 1024;
}

http {
    upstream sigesi_backend {
        server sigesi-backend:8080;
    }

    upstream sigesi_frontend {
        server sigesi-frontend:80;
    }

    upstream sigesi_test_frontend {
        server sigesi-test-frontend-1:80;
    }

    server {
        listen 80;
        server_name sigesi.ezioalves.cloud;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 80;
        server_name sigesi-test.ezioalves.cloud;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name sigesi-test.ezioalves.cloud;

        ssl_certificate /etc/letsencrypt/live/sigesi-test.ezioalves.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sigesi-test.ezioalves.cloud/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location = /api/arquivos/upload {
            client_max_body_size 6m;
            error_page 413 = @arquivo_grande_teste;
            proxy_pass http://sigesi_test_frontend;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_redirect off;
        }

        location @arquivo_grande_teste {
            default_type application/json;
            return 413 '{"status":413,"error":"Arquivo muito grande","message":"O arquivo excede o limite máximo de 5 MB"}';
        }

        location / {
            proxy_pass http://sigesi_test_frontend;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_redirect off;
        }
    }

    server {
        listen 443 ssl;
        server_name sigesi.ezioalves.cloud;

        ssl_certificate /etc/letsencrypt/live/sigesi.ezioalves.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sigesi.ezioalves.cloud/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location = /api/arquivos/upload {
            client_max_body_size 6m;
            error_page 413 = @arquivo_grande_producao;
            proxy_pass http://sigesi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        location @arquivo_grande_producao {
            default_type application/json;
            return 413 '{"status":413,"error":"Arquivo muito grande","message":"O arquivo excede o limite máximo de 5 MB"}';
        }

        location /api {
            proxy_pass http://sigesi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        location / {
            proxy_pass http://sigesi_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        location ~ ^/(oauth2|login|logout) {
            proxy_pass http://sigesi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }
    }
}
