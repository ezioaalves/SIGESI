spring.application.name=SIGESI

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

server.forward-headers-strategy=framework

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.servlet.session.cookie.same-site=Lax
server.servlet.session.cookie.secure=false

# MinIO Configuration
minio.endpoint=${MINIO_ENDPOINT:http://minio:9000}
minio.access-key=${MINIO_ACCESS_KEY}
minio.secret-key=${MINIO_SECRET_KEY}
minio.bucket-name=${MINIO_BUCKET_NAME:sigesi-files}

# Multipart File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=2KB

# Admin User
app.admin.email=${ADMIN_EMAIL}

app.oauth2.success-redirect=${OAUTH2_SUCCESS_REDIRECT:http://localhost:3000}
app.oauth2.failure-redirect=${OAUTH2_FAILURE_REDIRECT:http://localhost:3000/login?error=true}
app.oauth2.logout-redirect=${OAUTH2_LOGOUT_REDIRECT:http://localhost:3000}
